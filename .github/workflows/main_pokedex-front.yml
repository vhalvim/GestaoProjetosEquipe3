name: Build and deploy Node.js app to Azure Web App - pokedex-front

on:
  push:
    branches:
      - main
    paths:
      - 'GestaoProjetosEquipe3/pokedex-front/**' # Mantendo o filtro de diretório que você criou
  workflow_dispatch:

env:
  FRONTEND_PATH: 'GestaoProjetosEquipe3/pokedex-front'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm' # Adicionei cache para o deploy ficar mais rápido
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install and Build
        working-directory: ${{ env.FRONTEND_PATH }}
        run: |
          npm install
          npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # Garante que estamos pegando o conteúdo da pasta de saída do Vite/React
          path: ${{ env.FRONTEND_PATH }}/dist 

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./publish # Baixa em uma subpasta limpa para evitar conflitos

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pokedex-front'
          slot-name: 'Production'
          package: ./publish # Aponta para a pasta onde o download foi feito
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_C8BE3BD270EE42E8A80F8A0A2823675B }}
          clean: true