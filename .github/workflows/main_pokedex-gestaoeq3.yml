# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - pokedex-gestaoEq3

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  API_PATH: './API_Pokemon' # <-- Avisamos qual é a pasta correta da API

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read 

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install and build
        working-directory: ${{ env.API_PATH }} # <-- Entra na pasta API_Pokemon
        run: |
          npm install
          npm run build --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ${{ env.API_PATH }} # <-- Pega apenas os arquivos de dentro da API

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write 
      contents: read 

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_50A625FD88F24A118B741593E56AFD8D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_383A1325974F48C3A5DB45631D889FA8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8A411D3075754B94A9704C5548CC6839 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pokedex-gestaoEq3'
          slot-name: 'Production'
          package: . # Como o upload já filtrou a pasta, aqui continua como ponto